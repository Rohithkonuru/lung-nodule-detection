version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: lung-postgres
    environment:
      POSTGRES_DB: lungdb
      POSTGRES_USER: lung
      POSTGRES_PASSWORD: lung
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lung -d lungdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lung-backend
    env_file:
      - backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lung-frontend
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"

volumes:
  pg_data:
