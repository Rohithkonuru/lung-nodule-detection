services:
  postgres:
    image: postgres:16
    container_name: lung-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: lung-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_NAME: Lung Nodule Detection API
      APP_VERSION: 1.0.0
      API_V1_PREFIX: /api/v1
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CORS_ORIGINS: ${CORS_ORIGINS}
      UPLOAD_DIR: /app/uploads/scans
      MODEL_WEIGHTS_PATH: /app/models/${MODEL_WEIGHTS_FILE}
      ENABLE_DOMAIN_GUARD: ${ENABLE_DOMAIN_GUARD:-True}
      DEBUG_PRINT_RAW_OUTPUTS: ${DEBUG_PRINT_RAW_OUTPUTS:-False}
      PRINT_DEBUG_COUNTS: ${PRINT_DEBUG_COUNTS:-False}
    volumes:
      - uploads_data:/app/uploads
      - ./models:/app/models:ro
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api/v1
    container_name: lung-frontend-prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - app_net

volumes:
  pg_data:
  uploads_data:

networks:
  app_net:
    driver: bridge
